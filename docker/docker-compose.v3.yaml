# Run from project root: docker compose -f docker/docker-compose.v3.yaml --env-file backend/.env up --build -d
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: medfabric
      POSTGRES_USER: medfabric
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medfabric"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    image: medfabric-backend:3.0-beta
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg2://medfabric:${POSTGRES_PASSWORD:-changeme}@postgres:5432/medfabric
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-CHANGE_ME_IN_PRODUCTION}
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-120}
      REFRESH_TOKEN_EXPIRE_HOURS: ${REFRESH_TOKEN_EXPIRE_HOURS:-12}
      DATASET_ROOT: /data/datasets
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      EXPOSE_API_DOCS: ${EXPOSE_API_DOCS:-true}
      DOCKER_VERSION: ${DOCKER_VERSION:-}
    volumes:
      - ${DATASET_ROOT:-../data_sets}:/data/datasets:ro
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    image: medfabric-frontend:3.0-beta
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

  uptime-kuma:
    image: louislam/uptime-kuma:1
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      - uptime_kuma_data:/app/data
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  uptime_kuma_data:
