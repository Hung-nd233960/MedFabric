# Run from project root: docker compose -f docker/docker-compose.tailscale.yaml --env-file backend/.env up --build -d
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: medfabric
      POSTGRES_USER: medfabric
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medfabric"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    image: medfabric-backend:3.0-beta
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg2://medfabric:${POSTGRES_PASSWORD:-changeme}@postgres:5432/medfabric
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-CHANGE_ME_IN_PRODUCTION}
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-120}
      REFRESH_TOKEN_EXPIRE_HOURS: ${REFRESH_TOKEN_EXPIRE_HOURS:-12}
      DATASET_ROOT: /data/datasets
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      EXPOSE_API_DOCS: ${EXPOSE_API_DOCS:-false}
      DOCKER_VERSION: ${DOCKER_VERSION:-}
    volumes:
      - ${DATASET_ROOT:-../data_sets}:/data/datasets:ro
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    image: medfabric-frontend:3.0-beta
    restart: unless-stopped
    depends_on:
      - backend

  tailscale:
    build:
      context: .
      dockerfile: tailscale.Dockerfile
    hostname: ${TAILSCALE_HOSTNAME:-medfabric}
    restart: unless-stopped
    environment:
      TS_AUTHKEY: ${TAILSCALE_AUTH_KEY}
      TS_STATE_DIR: /var/lib/tailscale
      TS_USERSPACE: "false"
    volumes:
      - tailscale_state:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    depends_on:
      - frontend
    # socat forwards localhost:80 -> frontend:80 so tailscale funnel 80 has a local target.
    # frontend stays on the normal Docker network and can reach backend without issue.
    entrypoint: >
      /bin/sh -c "
        socat TCP-LISTEN:80,bind=0.0.0.0,fork,reuseaddr TCP:frontend:80 &
        /usr/local/bin/containerboot &
        until tailscale --socket /tmp/tailscaled.sock status --json 2>/dev/null | grep -q '\"BackendState\":\"Running\"'; do
          sleep 2
        done &&
        tailscale --socket /tmp/tailscaled.sock funnel 80 &&
        wait
      "

volumes:
  postgres_data:
  tailscale_state:
