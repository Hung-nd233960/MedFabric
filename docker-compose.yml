services:
  app:
    build: .
    container_name: medfabric_app
    ports:
      - "8501:8501"
    volumes:
      - ./public_data:/MedFabric/public_data  # host folder mapped to container
      - ./medfabric:/MedFabric/medfabric      # optional if you want live code reload
      - ./.streamlit:/MedFabric/.streamlit
    depends_on:
      - db
    environment:
    - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}

  db:
    container_name: medfabric_db
    image: postgres:15
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - db_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: medfabric_pgadmin
    restart: always
    ports:
      - "8080:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - db
  tailscale:
    image: tailscale/tailscale:latest
    container_name: medfabric_tailscale
    network_mode: "host"
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    volumes:
      - ./tailscale:/var/lib/tailscale
    command: tailscaled

volumes:
  db_data:
  pgadmin_data: