services:
  # Development service with local volume mapping
  app-dev:
    container_name: medfabric_app_dev
    build:
      context: .
      dockerfile: ./docker/app.Dockerfile
    ports:
      - "8501:8501"
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=${DATABASE_URL:-sqlite:///./medfabric.db}
    volumes:
      - ./medfabric:/app/medfabric
      - ./data_sets:/app/data_sets:ro
      - ./config.toml:/app/config.toml
      - ./medfabric.db:/app/medfabric.db
      - ./medfabric.db-shm:/app/medfabric.db-shm
      - ./medfabric.db-wal:/app/medfabric.db-wal
      - ./.streamlit:/app/.streamlit
    working_dir: /app
    profiles: ["dev"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Production service with Tailscale networking
  app-prod:
    container_name: medfabric_app_prod
    build:
      context: .
      dockerfile: ./docker/app.Dockerfile
    network_mode: service:tailscale
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=${DATABASE_URL:-sqlite:///./medfabric.db}
    volumes:
      - ./medfabric:/app/medfabric:ro
      - ./data_sets:/app/data_sets:ro
      - ./config.toml:/app/config.toml:ro
      - ./medfabric.db:/app/medfabric.db
      - ./medfabric.db-shm:/app/medfabric.db-shm
      - ./medfabric.db-wal:/app/medfabric.db-wal
      - ./.streamlit:/app/.streamlit:ro
    depends_on:
      - tailscale
    profiles: ["prod"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Tailscale VPN service (for secure networking in production)
  tailscale:
    image: tailscale/tailscale:latest
    container_name: tailscale_medfabric
    hostname: medfabric
    environment:
      - TS_AUTHKEY=${TS_AUTH_KEY:?Tailscale auth key required}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=false
    volumes:
      - ts_state:/var/lib/tailscale
    devices:
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - net_admin
    restart: unless-stopped
    profiles: ["prod"]

volumes:
  ts_state:
    driver: local
