services:
  app:
    container_name: medfabric_app
    build: 
      context: .
      dockerfile: ./docker/app.Dockerfile
    network_mode: service:tailscale
    volumes:
      - ./:/app
      - ./medfabric:/app/medfabric:ro
      - ./data_sets:/app/data_sets:ro
    profiles: ["dev", "prod"]
      
  
  tailscale:
    image: tailscale/tailscale:latest
    container_name: tailscale
    hostname: medfabric
    environment:
      - TS_AUTHKEY=${TS_AUTH_KEY}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=false
    volumes:
      - ts-test:/var/lib/tailscale
    devices:
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - net_admin
    restart: unless-stopped
#    command: tailscale serve 8501
    profiles: ["prod", "ops"]

volumes:
  ts-test:
    driver: local
