services:
  app:
    container_name: medfabric_app
    build: 
      context: .
      dockerfile: ./docker/app.Dockerfile
    network_mode: service:tailscale
    depends_on:
      - db
#        condition: service_healthy
#        restart: true
    volumes:
      - ./:/app
      - ./medfabric:/app/medfabric:ro
#      - ./data_sets:/app/data_sets:ro
      - ./public_data:/app/public_data:ro
    
      
  db:
    container_name: medfabric_db
    build:
      context: .
      dockerfile: ./docker/db.Dockerfile
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./db_backup:/db_backup   
    ports:
      - "5432:5432"

  pgadmin:
    image: dpage/pgadmin4
    container_name: medfabric_pgadmin
    ports:
      - "8080:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - db
  
  tailscale:
    image: tailscale/tailscale:latest
    container_name: tailscale
    hostname: medfabric
    environment:
      - TS_AUTHKEY=${TS_AUTH_KEY}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=false
    volumes:
      - ts-test:/var/lib/tailscale
    devices:
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - net_admin
    restart: unless-stopped
#    command: tailscale serve 8501

volumes:
  db_data:
  pgadmin_data:
  ts-test:
    driver: local
